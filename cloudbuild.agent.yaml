substitutions:
  _SERVICE_NAME: launch-copilot-agent
  _REGION: us-central1
  _AR_REPOSITORY: launch-copilot
  _IMAGE_TAG: latest
  _GEMINI_SECRET_NAME: gemini-api-key
  _DEEPGRAM_SECRET_NAME: deepgram-api-key
  _SESSION_STORE_BACKEND: firestore
  _FIRESTORE_DATABASE_ID: (default)
  _VERTEX_LOCATION: us-central1
  _VERTEX_MODEL: gemini-2.5-flash
  _VERTEX_LIVE_MODEL: gemini-live-2.5-flash-preview
  _LIVE_BATCH_IDLE_MS: "750"
  _LIVE_BATCH_MAX_MS: "1200"
  _LIVE_MIN_MEANINGFUL_WORDS: "4"
  _LIVE_CONTEXT_TRANSCRIPT_LINES: "4"
  _LIVE_CONTEXT_NODE_LIMIT: "8"
  _LIVE_CONTEXT_EDGE_LIMIT: "6"
  _VISITOR_BUDGET_BYPASS_IDS: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/agent/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=SESSION_STORE_BACKEND=${_SESSION_STORE_BACKEND},FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=${_REGION},VERTEX_LOCATION=${_VERTEX_LOCATION},VERTEX_MODEL=${_VERTEX_MODEL},VERTEX_LIVE_MODEL=${_VERTEX_LIVE_MODEL},LIVE_BATCH_IDLE_MS=${_LIVE_BATCH_IDLE_MS},LIVE_BATCH_MAX_MS=${_LIVE_BATCH_MAX_MS},LIVE_MIN_MEANINGFUL_WORDS=${_LIVE_MIN_MEANINGFUL_WORDS},LIVE_CONTEXT_TRANSCRIPT_LINES=${_LIVE_CONTEXT_TRANSCRIPT_LINES},LIVE_CONTEXT_NODE_LIMIT=${_LIVE_CONTEXT_NODE_LIMIT},LIVE_CONTEXT_EDGE_LIMIT=${_LIVE_CONTEXT_EDGE_LIMIT},VISITOR_BUDGET_BYPASS_IDS=${_VISITOR_BUDGET_BYPASS_IDS}
      - --update-secrets=GEMINI_API_KEY=${_GEMINI_SECRET_NAME}:latest,DEEPGRAM_API_KEY=${_DEEPGRAM_SECRET_NAME}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
