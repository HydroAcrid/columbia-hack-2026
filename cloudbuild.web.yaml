substitutions:
  _SERVICE_NAME: launch-copilot-web
  _REGION: us-central1
  _AR_REPOSITORY: launch-copilot
  _IMAGE_TAG: latest
  _NEXT_PUBLIC_AGENT_URL: https://launch-copilot-agent-353476176382.us-central1.run.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/web/Dockerfile
      - --build-arg=NEXT_PUBLIC_AGENT_URL=${_NEXT_PUBLIC_AGENT_URL}
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
