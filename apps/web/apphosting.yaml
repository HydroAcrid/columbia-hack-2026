runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
  concurrency: 80

env:
  # Firebase App Hosting is not the active deploy target.
  # If this file is reused, replace this with the current Cloud Run agent URL
  # from the active project before deploying.
  - variable: NEXT_PUBLIC_AGENT_URL
    value: https://replace-with-launch-copilot-agent-url
    availability:
      - BUILD
      - RUNTIME
